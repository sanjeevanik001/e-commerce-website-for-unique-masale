<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Reusable <head> fragment: meta tags, SEO, fonts and stylesheets.
  Usage: <head th:replace="~{fragments/head :: head}"></head>
-->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Unique Masale &amp; Food Products | Authentic Homemade Indian Spices</title>
    <meta name="description"
          content="Unique Masale &amp; Food Products offers authentic homemade Indian spices and traditional Maharashtrian food products, prepared hygienically with premium ingredients and no artificial colours.">
    <meta name="keywords"
          content="homemade masala, Indian spices, garam masala, goda masala, kala masala, kolhapuri masala, turmeric powder, red chilli powder, pickles, papad, ladoo, traditional Maharashtrian food">
    <meta name="author" content="Unique Masale &amp; Food Products">
    <meta name="theme-color" content="#E8871E">

    <!-- Open Graph -->
    <meta property="og:title" content="Unique Masale &amp; Food Products">
    <meta property="og:description"
          content="Authentic homemade Indian spices &amp; traditional food products delivered to your kitchen.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/images/hero.png">

    <link rel="icon" type="image/png" href="/images/logo.png">

    <!-- Fonts: Playfair Display (headings) + Poppins (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- Bootstrap 5 + Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Site stylesheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body></body>
</html>
