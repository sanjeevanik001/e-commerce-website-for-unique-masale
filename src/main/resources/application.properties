# ============================================================
# Unique Masale & Food Products - Application Configuration
# ============================================================

spring.application.name=Unique Masale & Food Products
server.port=8080

# Thymeleaf: disable caching during development for instant reloads.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Serve static assets (CSS, JS, images) with sensible caching in production.
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.cachecontrol.max-age=3600

# UTF-8 everywhere so Marathi/Indian characters render correctly.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
